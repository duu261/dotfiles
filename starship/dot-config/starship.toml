# Get editor completions based on the config schema
"$schema" = 'https://starship.rs/config-schema.json'

# Sets user-defined palette
# Palettes must be defined _after_ this line
palette = "catppuccin_macchiato"

# Starship modules
[character]
# Note the use of Catppuccin color 'peach'
success_symbol = "[[≤░Εδ](green) έζψ](peach)"
error_symbol = "[[≤░Εδ](red) έζψ](peach)"
vimcmd_symbol = "[≤░Εδ έζχ](subtext1)" # For use with zsh-vi-mode

[git_branch]
symbol = "ΎΡα "
style = "bold maroon"

[directory]
read_only = " ≤░Ν╛"
truncation_length = 4
style = "bold red"

[cmd_duration]
min_time = 2000
format = "took [$duration](peach) "

[status]
disabled = false
symbol = "έεΨ "
style = "bold red"

[git_status]
style = "bold maroon"
conflicted = "έγΦΎ╕Π"
ahead = "έΘκ${count}"
behind = "έΘμ${count}"
diverged = "έΘΧέΘκ${ahead_count}έΘμ${behind_count}"
untracked = "?${count}"
stashed = "\\$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "┬╗${count}"
deleted = "έεα${count}"

