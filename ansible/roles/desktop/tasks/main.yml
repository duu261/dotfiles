---
- name: Install desktop packages
  community.general.pacman:
    name: "{{ desktop_packages }}"
    state: present
  become: true

- name: Enable bluetooth service
  ansible.builtin.systemd:
    name: bluetooth
    enabled: true
    state: started
  become: true

- name: Enable NetworkManager service
  ansible.builtin.systemd:
    name: NetworkManager
    enabled: true
    state: started
  become: true

- name: Enable acpid
  ansible.builtin.systemd:
    name: acpid
    enabled: true
    state: started
  become: true

# No `state`: starting sddm mid-run would replace the current display manager
# and kill the session; stopping it would do the same on a re-run where sddm
# is already live. Enable only — takes effect next boot.
- name: Enable sddm display manager
  ansible.builtin.systemd:
    name: sddm
    enabled: true
  become: true

- name: Install desktop AUR packages
  kewlfft.aur.aur:
    name: "{{ item }}"
    state: present
  loop: "{{ desktop_aur_packages }}"
  become: true
  become_user: aur_builder

# sddm/ is system-owned (/etc, /usr/share), not a stow package — see dotfiles/CLAUDE.md.
- name: Ensure /etc/sddm.conf.d exists
  ansible.builtin.file:
    path: /etc/sddm.conf.d
    state: directory
    mode: '0755'
  become: true

- name: Deploy sddm theme selection
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../sddm/sddm.conf"
    dest: /etc/sddm.conf.d/catppuccin.conf
    mode: '0644'
  become: true

- name: Deploy sddm theme.conf override
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../sddm/theme.conf"
    dest: /usr/share/sddm/themes/catppuccin-macchiato-red/theme.conf
    mode: '0644'
  become: true

# sddm theme.conf points Background at ~/Pictures/Wallpapers/...; clone provides it.
- name: Clone wallpapers repo
  ansible.builtin.git:
    repo: https://github.com/duu261/wallpapers
    dest: "{{ ansible_env.HOME }}/Pictures/Wallpapers"
  async: 1200
  poll: 1

# caelestia's theme.enableGtk is disabled (cli.json) so it stops overwriting
# this back to the nonexistent adw-gtk3-dark on every scheme change - accent
# matches catppuccin-cursors-macchiato's "red" variant for consistency.
- name: Set GTK theme to catppuccin macchiato
  ansible.builtin.command: dconf write /org/gnome/desktop/interface/gtk-theme "'catppuccin-macchiato-red-standard+default'"
  changed_when: true

# GTK3/webkit2gtk apps (e.g. cc-switch, a Tauri app) read this key, not
# org.gnome.desktop.interface color-scheme (that's the GTK4/libadwaita
# portal path) - without it they ignore dark mode entirely.
- name: Prefer dark GTK theme variant
  ansible.builtin.command: dconf write /org/gnome/desktop/interface/gtk-application-prefer-dark-theme true
  changed_when: true

# qt6ct's own "style" had been left pointing at a nonexistent style name
# (no theme by that name was ever installed), so Qt apps (dolphin,
# quickshell, hyprpolkitagent) silently fell back to stock Fusion/light.
# kvantum-theme-catppuccin-git installs into /usr/share/Kvantum/ - verify
# the exact installed folder name before trusting this value (the GTK theme
# name was guessed wrong once already; check `ls /usr/share/Kvantum/`).
- name: Set qt6ct style to Kvantum
  community.general.ini_file:
    path: "{{ ansible_env.HOME }}/.config/qt6ct/qt6ct.conf"
    section: Appearance
    option: style
    value: kvantum
    no_extra_spaces: true

# custom_palette + color_scheme_path is a stale manual override from before
# Kvantum was set up: it forced text colours from an old qt6ct colour
# scheme file on top of Kvantum's own theme background, causing
# dark-on-dark unreadable text. Kvantum's theme already ships a full,
# consistent palette - let it own colours alone.
- name: Disable qt6ct custom palette so Kvantum theme colours aren't overridden
  community.general.ini_file:
    path: "{{ ansible_env.HOME }}/.config/qt6ct/qt6ct.conf"
    section: Appearance
    option: custom_palette
    value: "false"
    no_extra_spaces: true

- name: Set Kvantum theme to catppuccin macchiato
  community.general.ini_file:
    path: "{{ ansible_env.HOME }}/.config/Kvantum/kvantum.kvconfig"
    section: General
    option: theme
    value: catppuccin-macchiato-red
    no_extra_spaces: true
    create: true
