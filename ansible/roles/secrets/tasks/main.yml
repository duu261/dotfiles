---
# Deploy the vault-encrypted secrets file to a plaintext runtime copy that zsh
# sources. `copy` with decrypt:true auto-decrypts the vault src under
# --ask-vault-pass; the repo copy stays encrypted, stow never touches it.
# See dotfiles/CLAUDE.md "Secrets" section.
- name: Deploy secrets to ~/.secrets
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../zsh/dot-secrets"
    dest: "{{ ansible_env.HOME }}/.secrets"
    mode: "0600"
    decrypt: true
- name: Authenticate gh CLI with vaulted GitHub PAT
  ansible.builtin.shell: |
    set -o pipefail
    set -a; source ~/.secrets; set +a
    echo "$GITHUB_PERSONAL_ACCESS_TOKEN" | gh auth login --with-token
  args:
    executable: /bin/bash
    creates: "{{ ansible_env.HOME }}/.config/gh/hosts.yml"
  no_log: true
