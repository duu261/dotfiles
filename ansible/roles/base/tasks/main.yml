---
- name: Enable color output in pacman.conf
  ansible.builtin.lineinfile:
    path: /etc/pacman.conf
    regexp: '^#?Color'
    line: Color
  become: true

- name: Enable parallel downloads in pacman.conf
  ansible.builtin.lineinfile:
    path: /etc/pacman.conf
    regexp: '^#?ParallelDownloads'
    line: ParallelDownloads = 5
  become: true

- name: Enable verbose package lists in pacman.conf
  ansible.builtin.lineinfile:
    path: /etc/pacman.conf
    regexp: '^#?VerbosePkgLists'
    line: VerbosePkgLists
  become: true

- name: Set makepkg parallel compilation (MAKEFLAGS)
  ansible.builtin.lineinfile:
    path: /etc/makepkg.conf
    regexp: '^#?MAKEFLAGS='
    line: 'MAKEFLAGS="-j$(nproc)"'
  become: true

- name: Cap systemd journal size
  ansible.builtin.lineinfile:
    path: /etc/systemd/journald.conf
    regexp: '^#?SystemMaxUse='
    line: SystemMaxUse=200M
  become: true
  notify: Restart journald

- name: Enable fstrim timer (SSD/NVMe TRIM)
  ansible.builtin.systemd:
    name: fstrim.timer
    enabled: true
    state: started
  become: true

# tags: always — tag-filtered runs (e.g. --tags dev) skip the rest of base,
# but any run that installs packages still needs a fresh keyring first.
- name: Refresh keyring before any package install (stale keys break PGP checks)
  community.general.pacman:
    name: archlinux-keyring
    state: latest
    update_cache: true
  become: true
  tags: [always]

- name: Install base packages
  community.general.pacman:
    name: "{{ base_packages }}"
    state: present
  become: true

- name: Enable reflector timer (periodic mirrorlist refresh)
  ansible.builtin.systemd:
    name: reflector.timer
    enabled: true
    state: started
  become: true

- name: Enable paccache timer (weekly package cache cleanup)
  ansible.builtin.systemd:
    name: paccache.timer
    enabled: true
    state: started
  become: true

- name: Enable pkgfile-update timer (command-not-found database refresh)
  ansible.builtin.systemd:
    name: pkgfile-update.timer
    enabled: true
    state: started
  become: true

- name: Populate pkgfile database (first run)
  ansible.builtin.command: pkgfile -u
  become: true
  changed_when: false

- name: Ensure pacman hooks directory exists
  ansible.builtin.file:
    path: /etc/pacman.d/hooks
    state: directory
    mode: '0755'
  become: true

- name: Deploy paccache pacman hook (keep last 2 versions)
  ansible.builtin.copy:
    dest: /etc/pacman.d/hooks/paccache.hook
    content: |
      [Trigger]
      Operation = Upgrade
      Operation = Install
      Operation = Remove
      Type = Package
      Target = *

      [Action]
      Description = Cleaning package cache...
      When = PostTransaction
      Exec = /usr/bin/paccache -rvk2
    mode: '0644'
  become: true

- name: Deploy orphan check pacman hook
  ansible.builtin.copy:
    dest: /etc/pacman.d/hooks/orphans.hook
    content: |
      [Trigger]
      Operation = Install
      Operation = Upgrade
      Operation = Remove
      Type = Package
      Target = *

      [Action]
      Description = Checking for orphaned packages...
      When = PostTransaction
      Exec = /usr/bin/bash -c "/usr/bin/pacman -Qtd || /usr/bin/echo '=> No orphans found.'"
    mode: '0644'
  become: true

- name: Deploy rebuild-detector pacman hook
  ansible.builtin.copy:
    dest: /etc/pacman.d/hooks/rebuild-detector.hook
    content: |
      [Trigger]
      Operation = Upgrade
      Type = Package
      Target = python
      Target = perl

      [Action]
      Description = Checking for AUR packages that need rebuild...
      When = PostTransaction
      Exec = /usr/bin/rebuild-detector
    mode: '0644'
  become: true

# kewlfft.aur's own docs recommend a dedicated unprivileged builder user with
# scoped NOPASSWD sudo, rather than relying on the invoking user's interactive
# sudo ticket - that ticket doesn't exist on a fresh/unattended run and yay's
# internal sudo calls (build deps, final pacman -U) have no tty to prompt on.
- name: Create aur_builder user
  ansible.builtin.user:
    name: aur_builder
    system: true
    create_home: true
    shell: /usr/bin/nologin
  become: true

- name: Grant aur_builder NOPASSWD sudo for pacman only
  ansible.builtin.copy:
    content: "aur_builder ALL=(ALL) NOPASSWD: /usr/bin/pacman\n"
    dest: /etc/sudoers.d/aur_builder
    mode: '0440'
    validate: /usr/sbin/visudo -cf %s
  become: true

# kewlfft.aur only detects an existing helper on $PATH, never installs one -
# bootstrap yay here so a fresh machine needs no manual pre-step.
- name: Check for yay
  ansible.builtin.command: which yay
  register: base_yay_check
  failed_when: false
  changed_when: false

- name: Clone yay AUR helper
  ansible.builtin.git:
    repo: https://aur.archlinux.org/yay.git
    dest: /home/aur_builder/yay
    version: master
  become: true
  become_user: aur_builder
  when: base_yay_check.rc != 0

- name: Build and install yay
  ansible.builtin.command: makepkg -si --noconfirm
  args:
    chdir: /home/aur_builder/yay
  become: true
  become_user: aur_builder
  when: base_yay_check.rc != 0
  changed_when: true

- name: Install AUR packages
  kewlfft.aur.aur:
    name: "{{ item }}"
    state: present
  loop: "{{ aur_packages }}"
  become: true
  become_user: aur_builder

- name: Deploy yay config (auto-clean build deps, keep sudo alive)
  ansible.builtin.copy:
    dest: "{{ ansible_env.HOME }}/.config/yay/config.json"
    content: |
      {
        "answerclean": "All",
        "sudoloop": true
      }
    mode: '0644'

- name: Update user directories
  ansible.builtin.command: xdg-user-dirs-update
  changed_when: false

- name: Enable docker service
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
  become: true

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ ansible_user_id }}"
    groups: docker
    append: true
  become: true

- name: Enable ufw firewall
  ansible.builtin.systemd:
    name: ufw
    enabled: true
    state: started
  become: true
