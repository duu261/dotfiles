---
- name: Set git user.email
  community.general.git_config:
    name: user.email
    scope: global
    value: vuhn261@gmail.com

- name: Set git user.name
  community.general.git_config:
    name: user.name
    scope: global
    value: Duu

- name: Install git-delta
  community.general.pacman:
    name: git-delta
    state: present
  become: true

# Wires git-delta as the diff/log/show pager. Was flagged in todo.md as
# "not yet wired" — package alone does nothing without these.
- name: Configure git-delta pager
  community.general.git_config:
    name: "{{ item.name }}"
    scope: global
    value: "{{ item.value }}"
  loop:
    - { name: core.pager, value: delta }
    - { name: interactive.diffFilter, value: "delta --color-only" }
    - { name: delta.navigate, value: "true" }
    - { name: merge.conflictstyle, value: diff3 }
    - { name: diff.colorMoved, value: default }

- name: Configure beginner-safe git defaults
  community.general.git_config:
    name: "{{ item.name }}"
    scope: global
    value: "{{ item.value }}"
  loop:
    - { name: init.defaultBranch, value: main }
    - { name: pull.rebase, value: "false" }
    - { name: push.autoSetupRemote, value: "true" }
    - { name: fetch.prune, value: "true" }
    - { name: core.editor, value: nvim }

- name: Configure GitHub CLI credential helper
  community.general.git_config:
    name: "credential.https://{{ item }}.helper"
    scope: global
    value: "!/usr/bin/gh auth git-credential"
  loop:
    - github.com
    - gist.github.com
