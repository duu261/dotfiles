---
- name: Ensure ~/.ssh directory exists
  ansible.builtin.file:
    path: ~/.ssh
    state: directory
    mode: '0700'

# Vault-encrypted keypair lives in ansible/.ssh/; decrypt:true mirrors the
# secrets role's pattern (see dotfiles/CLAUDE.md "Secrets").
- name: Deploy private key
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/.ssh/id_ed25519"
    dest: "{{ ansible_env.HOME }}/.ssh/id_ed25519"
    mode: '0600'
    decrypt: true

- name: Deploy public key
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/.ssh/id_ed25519.pub"
    dest: "{{ ansible_env.HOME }}/.ssh/id_ed25519.pub"
    mode: '0644'

# Keypair is shared across every machine this playbook provisions (same
# vault-encrypted id_ed25519 deployed everywhere), so authorizing it here lets
# any of those machines SSH into this one with the shared identity.
- name: Add key to authorized_keys
  ansible.posix.authorized_key:
    user: "{{ ansible_user_id }}"
    state: present
    key: "{{ lookup('file', playbook_dir + '/.ssh/id_ed25519.pub') }}"

# Key auth is provisioned above, so drop password/root login. Access is also
# tailnet-gated (tailscale role), but keep host-level hardening independent of
# the VPN in case sshd is ever reachable on another interface.
- name: Harden sshd - key-only auth
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/10-hardening.conf
    content: |
      PasswordAuthentication no
      PermitRootLogin no
    mode: '0644'
  become: true
  notify: Reload sshd

- name: Enable sshd
  ansible.builtin.systemd:
    name: sshd
    enabled: true
    state: started
  become: true
