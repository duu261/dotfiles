---
- name: Clone dotfiles repository with submodules
  ansible.builtin.git:
    repo: git@github.com:duu261/dotfiles.git
    dest: ~/dotfiles
    recursive: true
    update: false          # clone only if absent; never reset an existing working repo
    accept_hostkey: true
  async: 1200
  poll: 0
  register: dotfiles_clone

- name: Wait for dotfiles clone to complete
  ansible.builtin.async_status:
    jid: "{{ dotfiles_clone.ansible_job_id }}"
  register: dotfiles_clone_result
  until: dotfiles_clone_result.finished
  retries: 120
  delay: 10
  failed_when: dotfiles_clone_result.failed | default(false)

# /etc/skel (useradd) and first-run zsh both drop plain files at these paths.
# stow refuses to symlink over a pre-existing regular file - remove only real
# files here, never touch an existing symlink (leaves already-stowed state alone).
- name: Check for pre-existing skeleton dotfiles that would conflict with stow
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/{{ item }}"
  loop:
    - .bashrc
    - .bash_profile
    - .bash_logout
    - .zshrc
  register: skel_check

- name: Remove conflicting skeleton dotfiles (regular files only, not symlinks)
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/{{ item.item }}"
    state: absent
  loop: "{{ skel_check.results | selectattr('stat.exists') | rejectattr('stat.islnk') | list }}"

# Pre-create the shared parent dirs so `stow` symlinks individual leaves into
# them instead of symlinking a whole top-level dir (e.g. ~/.config) to the repo.
- name: Pre-create stow target parent directories
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - .config
    - .local/share

- name: Stow shared packages
  ansible.builtin.command: stow --dotfiles -d "{{ ansible_env.HOME }}/dotfiles" -t "{{ ansible_env.HOME }}" {{ item }}
  loop: "{{ stow_packages }}"
  changed_when: true

- name: Stow desktop packages (when profile=desktop)
  ansible.builtin.command: stow --dotfiles -d "{{ ansible_env.HOME }}/dotfiles" -t "{{ ansible_env.HOME }}" {{ item }}
  loop: "{{ desktop_stow_packages }}"
  when: profile == 'desktop'
  changed_when: true

# package.toml locks flavor + plugin deps (ya pkg add/ya pkg install), not
# pacman/AUR - without this, flavors/plugins referenced in yazi.toml/init.lua
# silently no-op since their files were never fetched.
- name: Install yazi plugins and flavor (package.toml lockfile)
  ansible.builtin.command: ya pkg install
  args:
    chdir: "{{ ansible_env.HOME }}/.config/yazi"
    creates: "{{ ansible_env.HOME }}/.config/yazi/flavors/catppuccin-macchiato.yazi"
