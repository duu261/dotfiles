---
# Desktop-only (Hyprland/Wayland). Merged into `all.yml` vars for hosts in the
# `desktop` group / when profile == 'desktop'. All GUI, none tui-safe.

desktop_packages:
  - hyprland
  - wezterm
  - qt6ct
  - kvantum         # Qt style engine, needed for a real catppuccin Qt theme (qt6ct fallback style has no dark theme)
  - swappy          # GUI screenshot annotator (grim/slurp pipeline)
  - fuzzel          # dmenu backend for caelestia emoji/clipboard subcommands
  - sddm
  - pipewire
  - pipewire-pulse
  - wireplumber
  - pavucontrol
  - gnome-keyring   # execs.lua: gnome-keyring-daemon --start
  - udiskie         # execs.lua: udiskie
  - cliphist        # execs.lua: wl-paste --watch cliphist store
  - papirus-icon-theme    # icon theme for nwg-look/GTK apps
  - thunar          # GUI file manager, drag-drop UF2 flashing for zmk keyboard
  - gvfs            # mount/trash backend for thunar
  - ttf-firacode-nerd        # fuzzel.ini + sddm theme.conf font
  - bluez
  - bluez-utils
  - fcitx5
  - fcitx5-configtool
  - fcitx5-gtk
  - fcitx5-qt
  - acpi
  - acpid
  - xorg-xwayland    # non-native-Wayland apps (some Electron, older GUI tools)
  - qt5-wayland      # Qt5 apps blurry/broken without native Wayland support
  - qt6-wayland      # Qt6 apps blurry/broken without native Wayland support
  - noto-fonts       # broad glyph fallback
  - noto-fonts-cjk   # CJK fallback for Caelestia and desktop UI
  - noto-fonts-emoji # emoji fallback
  - networkmanager
  - xdg-desktop-portal-hyprland
  - xdg-desktop-portal-gtk
  - hyprpolkitagent
  - wl-clipboard
  - grim
  - slurp
  - brightnessctl
  - playerctl
  - nwg-look
  - xdg-utils
  - trash-cli
  - geoclue2         # location provider for gammastep night light
  - gammastep        # night light
  - imv
  - mpv
  - ffmpeg
  - imagemagick

# Installed via kewlfft.aur, same as base role's aur_packages.
desktop_aur_packages:
  - caelestia-shell                 # shell package pulls Caelestia runtime and shell dependencies
  - catppuccin-sddm-theme-macchiato  # https://github.com/catppuccin/sddm
  - catppuccin-cursors-macchiato
  - catppuccin-gtk-theme-macchiato  # https://github.com/catppuccin/gtk
  - kvantum-theme-catppuccin-git    # https://github.com/catppuccin/Kvantum, Qt-side match for the GTK theme above
  - fcitx5-bamboo-git                # Vietnamese input engine

desktop_stow_packages:
  - hypr
  - wezterm
  - qt6ct
  - caelestia
  - fuzzel
  - swappy
  - gtk-3.0
  - kvantum
