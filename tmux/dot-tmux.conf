source-file ~/.tmux-bind.conf
# ~/.tmux.conf
set -g base-index 1
# shift enter claude
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
set -g renumber-windows on
set -g pane-base-index 1
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*256col*:RGB"
set -g allow-passthrough on
# Unbind and rebind prefix key
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Options to make tmux more pleasant
set -g mouse on
set-option -g focus-events on
set -sg escape-time 0
set -g history-limit 10000

## TPM plugins
set -g @plugin 'tmux-plugins/tpm'               # plugin manager
set -g @plugin 'tmux-plugins/tmux-sensible'      # sane defaults
set -g @plugin 'catppuccin/tmux'                 # theme
set -g @plugin 'tmux-plugins/tmux-battery'       # battery in status bar
set -g @plugin 'joshmedeski/tmux-nerd-font-window-name'  # nerd-font window icons
set -g @plugin 'alexwforsythe/tmux-which-key'    # prefix + space menu
set -g @plugin 'junegunn/tmux-fzf-url'           # prefix + u, open URLs in pane

### configure plugins
set -g @catppuccin_session_icon "󰇥 "
set -ogq @catppuccin_status_left_separator "█"
set -ogq @catppuccin_status_middle_separator ""
### https://github.com/catppuccin/tmux
set -g @catppuccin_flavor 'macchiato'
set -g @catppuccin_window_status_style 'basic'
set -g @catppuccin_window_number_position 'right'
set -g @catppuccin_window_default_text '#W'
set -g @catppuccin_window_current_fill 'number'
set -g @catppuccin_window_current_text '#W'
set -g @catppuccin_window_fill 'number'
set -g @catppuccin_window_text '#W'

set -g @catppuccin_directory_text " #($HOME/.bin/shorten_path.sh #{pane_current_path})"


# source the plugin here
run '~/.tmux/plugins/tmux/catppuccin.tmux'


# set left and right status bar
set -g allow-rename off
set -g status-interval 5
set -g status-left-length 100
set -g status-right-length 100
set -g status-left ' #{E:@catppuccin_status_session}'
set -g status-right '#{E:@catppuccin_status_directory}'
set -ag status-right '#{E:@catppuccin_status_gitmux}'
if 'test -r /sys/class/power_supply/BAT*' {
  set -agF status-right '#{E:@catppuccin_status_battery}'
}

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
if "test ! -f ~/.tmux/plugins/tpm/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"
run '~/.tmux/plugins/tpm/tpm'
