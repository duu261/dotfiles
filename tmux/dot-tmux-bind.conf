bind -r -T prefix C-h resize-pane -L 20
bind -r -T prefix C-l resize-pane -R 20
bind -r -T prefix C-j resize-pane -D 7
bind -r -T prefix C-k resize-pane -U 7

# vim motion copy mode
set-window-option -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'

# mouse-drag select auto-copies to clipboard, no y needed
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'wl-copy'

# vim-like pane switching
bind -r k select-pane -U
bind -r j select-pane -D
bind -r h select-pane -L
bind -r l select-pane -R

# smart-splits.nvim: seamless nav across tmux panes and nvim splits (no prefix)
# nvim side handles C-hjkl when focused; tmux handles it otherwise
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n C-h if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n C-j if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n C-k if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n C-l if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'
bind-key -n 'C-\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'

bind-key -T copy-mode-vi C-h select-pane -L
bind-key -T copy-mode-vi C-j select-pane -D
bind-key -T copy-mode-vi C-k select-pane -U
bind-key -T copy-mode-vi C-l select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# forget the find window.  That is for chumps
bind-key -r f run-shell "tmux neww tmux-sessionizer"
bind-key -r i run-shell "tmux neww tmux-cht.sh"
bind-key -r M-h run-shell "tmux-sessionizer -s 0"
bind-key -r M-j run-shell "tmux-sessionizer -s 1"
bind-key -r M-k run-shell "tmux-sessionizer -s 2"
bind-key -r M-l run-shell "tmux-sessionizer -s 3"

# per-directory todo, creates TODO.md if missing
bind -r D neww -c "#{pane_current_path}" "nvim TODO.md"
bind r source-file ~/.tmux.conf \; display "Config reloaded"
